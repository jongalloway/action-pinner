- id: pin-actions-scan
  name: pin-actions scan
  description: Fail when workflows contain unpinned GitHub Actions refs.
  entry: pin-actions scan --path
  language: node
  additional_dependencies: []
  files: \.github/workflows/
  types: [yaml]
  pass_filenames: true

- id: pin-actions-fix
  name: pin-actions fix
  description: Pin GitHub Actions refs in workflow files.
  entry: pin-actions fix --path
  language: node
  additional_dependencies: []
  files: \.github/workflows/
  types: [yaml]
  pass_filenames: true
