- id: action-pinner-scan
  name: action-pinner scan
  description: Fail when workflows contain unpinned GitHub Actions refs.
  entry: action-pinner scan --path
  language: node
  additional_dependencies: []
  files: \.github/workflows/
  types: [yaml]
  pass_filenames: true

- id: action-pinner-fix
  name: action-pinner fix
  description: Pin GitHub Actions refs in workflow files.
  entry: action-pinner fix --path
  language: node
  additional_dependencies: []
  files: \.github/workflows/
  types: [yaml]
  pass_filenames: true
